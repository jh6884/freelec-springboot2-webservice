plugins { // (1) springboot의 의존성들을 관리해주는 플러그인
    // id 'org.springframework.boot' version '2.4.1' // RELEASE 삭제
    id 'org.springframework.boot' version '3.2.0'
    // id 'io.spring.dependency-management' version '1.0.10.RELEASE'
    id 'io.spring.dependency-management' version '1.1.4' // springboot의 의존성을 관리해주는 플러그인
    id 'java'
}

group 'com.jojoldu.book'
version '1.0.4-SNAPSHOT-'+new Date().format("yyyyMMddHHmmss")
sourceCompatibility = 1.8

java {
    sourceCompatibility = JavaVersion.VERSION_17 // Java 17로 업그레이드 (Spring Boot 3.x 최소 요구사항)
}

// 원격 저장소
repositories {
    mavenCentral()
}

// for Junit 5
test { // (2)
    useJUnitPlatform()
}

dependencies {
    //(3) 프로젝트 개발에 필요한 의존성 선언
    implementation('org.springframework.boot:spring-boot-starter-web')
    // 테스트 관련
    testImplementation('org.springframework.boot:spring-boot-starter-test')
}